<style>

    src: url('https://raw.githubusercontent.com/Ditzzx-vibecoder/Assets/main/Font/iconfont.ttf');

  :root{
    --sakura-1:#2a0f3d; --sakura-2:#ff2e88; --sakura-3:#c026d3;
    --lilac:#a855f7; --sky:#22d3ee; --ink:#efe6ff;
    --paper:#0a0612; --card:#150c22; --gold:#ffd166;

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh; font-family:'Plus Jakarta Sans', sans-serif;
    color:var(--ink); background-image: url('https://files.catbox.moe/71hgmr.jpg');
    background-size: cover; background-position: center;
    background-attachment: fixed; overflow-x:hidden;
  }
  .wrap{ max-width:1180px; margin:0 auto; padding:36px 20px 80px; }
  .card{ background:var(--card); border-radius:22px; padding:26px 24px; box-shadow: var(--shadow); border:1px solid #3a1f52; margin-bottom: 20px;}
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:12.5px; font-weight:700; color:#9c7fc9; margin-bottom:6px; font-family:'Baloo 2', sans-serif; }
  .field input[type=number]{ width:100%; padding:11px 13px; border-radius:12px; border:1.5px solid #3a1f52; background:#0f0819; color:var(--ink); font-family:'Plus Jakarta Sans', sans-serif;}
  
  .make-btn{ width:100%; padding:14px; border-radius:14px; font-family:'Baloo 2'; font-weight:800; color:#fff; background: linear-gradient(135deg, var(--sakura-3), var(--sky)); cursor:pointer; border:none; margin-top: 10px;}
  .canvas-frame{ width:100%; max-width:360px; border-radius:18px; border:6px solid #1a0e2b; background:#0f0819; margin: 20px auto; display:block; overflow: hidden; }
  .canvas-frame canvas{ width:100%; display:block; }
  .sidebar { position: fixed; left: -300px; top: 0; width: 300px; height: 100%; background: var(--card); border-right: 2px solid #3a1f52; transition: left 0.3s ease; z-index: 1000; padding: 20px; box-shadow: var(--shadow); }
  .sidebar.active { left: 0; }
  .sidebar h2 { color: #fff; font-family: 'Baloo 2'; margin-bottom: 30px; font-size: 24px; text-align: center; border-bottom: 1px solid #3a1f52; padding-bottom: 15px; }
  .sidebar a { display: block; color: var(--ink); text-decoration: none; padding: 15px 20px; margin-bottom: 12px; border-radius: 12px; background: #0f0819; transition: 0.2s; border: 1px solid #3a1f52; font-family: 'Baloo 2'; font-weight: 700; }
  .sidebar a:hover { background: linear-gradient(135deg, var(--sakura-3), var(--lilac)); color: #fff; }
  .menu-btn { position: absolute; left: 20px; top: 20px; z-index: 999; background: var(--card); border: 2px solid #3a1f52; color: #fff; padding: 12px 20px; border-radius: 12px; cursor: pointer; }
  .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 998; display: none; }
  .overlay.active { display: block; }
  .dl-btn{ width:100%; padding:14px; border-radius:14px; font-family:'Baloo 2'; font-weight:800; color:#fff; background: var(--sakura-2); cursor:pointer; border:none; text-align:center; display:none; text-decoration:none;}

<body>
<button class="menu-btn" onclick="toggleMenu()">☰ Buka Menu</button>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="sidebar" id="sidebar">
    <h2>⚡ Zepar Features</h2>
    <a href="index.html">🏠 Home</a>

    <a href="ttqc.html">🎵 Fake Tiktok Chat</a>
    <a href="post-ig-v2.html">✨ Fake Post IG v2</a>
</div>
<div class="wrap" style="padding-top: 80px;">
    <div class="card">
        <h2 style="color: #fff; font-family: 'Baloo 2';">Fake Saldo DANA</h2>
        <div class="field">
            <label>Nominal Saldo (Tanpa Titik)</label>
            <input type="number" id="nominal" value="150000" placeholder="Contoh: 150000">
        </div>
        <button class="make-btn" onclick="generateDANA()">Generate Image</button>
    </div>
    <div class="canvas-frame">
        <!-- Canvas will resize based on background image -->
        <canvas id="canvas" width="720" height="1280"></canvas>
    </div>
    <a id="downloadBtn" class="dl-btn" download="fake-saldo-dana.png">Download Image</a>
</div>
<script>
  function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('active');
      document.getElementById('overlay').classList.toggle('active');
  }

  // Preload Images
  const bgImg = new Image();
  bgImg.crossOrigin = "Anonymous";
  bgImg.src = 'https://raw.githubusercontent.com/Ditzzx-vibecoder/Assets/main/Image/_20260501192538912.jpg';

  const eyeIcon = new Image();
  eyeIcon.crossOrigin = "Anonymous";
  eyeIcon.src = 'https://raw.githubusercontent.com/Ditzzx-vibecoder/Assets/main/Image/vision-off-svgrepo-com%20(1).svg';

  async function generateDANA() {
      const rawNominal = document.getElementById('nominal').value;
      const raw = Number(rawNominal.replace(/\./g, ''));
      
      if (isNaN(raw) || rawNominal === '') {
          alert('Nominal tidak valid!');
          return;
      }
      
      const angka = raw.toLocaleString('id-ID');
      
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      
      // Wait for assets and fonts to be ready
      await Promise.all([
          new Promise(r => { if(bgImg.complete) r(); else bgImg.onload = r; bgImg.onerror = r; }),
          new Promise(r => { if(eyeIcon.complete) r(); else eyeIcon.onload = r; eyeIcon.onerror = r; }),
          document.fonts.ready
      ]);
      
      // Set canvas size matching the background image
      if (bgImg.width && bgImg.height) {
          canvas.width = bgImg.width;
          canvas.height = bgImg.height;
      }
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Draw Background
      try { 
          ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height); 
      } catch(e) {
          console.error("Gagal meload background");
      }
      
      // Draw 'Rp'
      ctx.font = "19px FontRp, sans-serif";
      ctx.fillStyle = '#a9e6ff';
      ctx.textBaseline = 'top';
      ctx.fillText('Rp', 70, 62);
      
      // Draw Saldo
      ctx.font = "29px FontSaldo, sans-serif";
      ctx.fillStyle = '#FFFFFF';
      ctx.textBaseline = 'top';
      ctx.fillText(angka, 101, 53);
      
      // Calculate icon position
      const textWidth = ctx.measureText(angka).width;
      const iconX = 101 + textWidth + 8;
      
      // Draw Eye Icon (with invert filter)
      ctx.save();
      ctx.filter = 'brightness(0) invert(1)';
      try {
          ctx.drawImage(eyeIcon, iconX, 64, 20, 20);
      } catch(e) {
          console.error("Gagal meload icon");
      }
      ctx.restore();
      
      // Enable Download
      const dlBtn = document.getElementById('downloadBtn');
      dlBtn.href = canvas.toDataURL('image/png');
      dlBtn.style.display = 'block';
  }
</script>
</body>
