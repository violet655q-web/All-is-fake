<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zepar - Fake Call iOS</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Poppins:wght@400;500;600&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sakura-1:#2a0f3d;
    --sakura-2:#ff2e88;
    --sakura-3:#c026d3;
    --lilac:#a855f7;
    --sky:#22d3ee;
    --ink:#efe6ff;
    --paper:#0a0612;
    --card:#150c22;
    --gold:#ffd166;
    --shadow: 0 10px 30px rgba(168, 40, 220, 0.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    font-family:'Poppins', sans-serif;
    color:var(--ink);
    background-image: url('https://files.catbox.moe/71hgmr.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    overflow-x:hidden;
    position:relative;
  }
  .wrap{position:relative; z-index:1; max-width:1180px; margin:0 auto; padding:36px 20px 80px;}
  header.hero{ text-align:center; margin-bottom:34px; }
  .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-family:'Baloo 2', sans-serif; font-weight:700;
    font-size:13px; letter-spacing:.14em; text-transform:uppercase;
    color:#ff6fd4; background:#1a0e2b; border:1px solid #5a2680;
    padding:6px 16px; border-radius:999px; box-shadow: var(--shadow);
  }
  h1.title{
    font-family:'Baloo 2', sans-serif; font-weight:800;
    font-size:clamp(32px, 6vw, 54px); margin:16px 0 6px;
    line-height:1.05; background: linear-gradient(90deg, var(--sakura-2), var(--lilac) 55%, var(--sky));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter: drop-shadow(0 0 18px rgba(192,38,212,.45));
  }
  .sub{ color:#b39cc9; font-size:15.5px; max-width:520px; margin:0 auto; text-align:center;}
  .card{ background:var(--card); border-radius:22px; padding:26px 24px; box-shadow: var(--shadow); border:1px solid #3a1f52; margin-bottom: 20px;}
  .card h2{ font-family:'Baloo 2', sans-serif; font-size:19px; margin:0 0 18px; display:flex; align-items:center; gap:8px; color:#f0e6ff; }
  .badge-dot{width:9px; height:9px; border-radius:50%; background:var(--sakura-2); display:inline-block; box-shadow:0 0 8px var(--sakura-2);}
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:12.5px; font-weight:700; color:#9c7fc9; margin-bottom:6px; letter-spacing:.03em; text-transform:uppercase; font-family:'Baloo 2', sans-serif; }
  .field input[type=text], .field textarea, .field select{ width:100%; padding:11px 13px; border-radius:12px; border:1.5px solid #3a1f52; background:#0f0819; font-family:'Poppins', sans-serif; font-size:14.5px; color:var(--ink); resize:vertical; }
  .field input:focus, .field textarea:focus, .field select:focus{ outline:none; border-color: var(--sakura-3); box-shadow:0 0 0 3px rgba(192,38,212,.25); }
  .file-drop{ border:2px dashed #4a2670; border-radius:14px; padding:14px; text-align:center; cursor:pointer; background:#150c22; font-size:13px; color:#9c7fc9; transition:.15s; display:flex; align-items:center; justify-content:center; gap:8px; flex-direction:column;}
  .file-drop:hover{ background:#1e1130; border-color:var(--sakura-3); }
  .file-drop input{ display:none; }
  .thumb{ width:60px; height:60px; border-radius:50%; object-fit:cover; display:none; border:2px solid var(--sakura-3);}
  .make-btn{ width:100%; margin-top:6px; padding:14px; border:none; border-radius:14px; font-family:'Baloo 2', sans-serif; font-weight:800; font-size:15.5px; color:#fff; background: linear-gradient(135deg, var(--sakura-3), var(--sky)); cursor:pointer; box-shadow:0 8px 24px rgba(192,38,212,.45); transition:.15s; }
  .make-btn:hover{ transform:translateY(-2px); box-shadow:0 12px 30px rgba(34,211,238,.4); }
  .preview-card{ display:flex; flex-direction:column; align-items:center; gap:14px; }
  .canvas-frame{ width:100%; max-width:360px; border-radius:18px; overflow:hidden; box-shadow: 0 14px 34px rgba(168,40,220,.35); border:6px solid #1a0e2b; background:#0f0819; }
  .canvas-frame canvas{ width:100%; display:block; }
  .dl-btn{ font-family:'Baloo 2', sans-serif; font-weight:700; font-size:14px; padding:11px 22px; border-radius:12px; border:2px solid var(--sakura-3); background:transparent; color:var(--sakura-2); cursor:pointer; transition:.15s; }
  .dl-btn:hover{ background:var(--sakura-3); color:#fff; }
  .hint{ font-size:12px; color:#8a72a8; text-align:center; max-width:300px; }
  .nav-back{ display:inline-block; margin-bottom: 20px; color: var(--sky); text-decoration: none; font-family: 'Baloo 2'; font-weight: 700; border: 1px solid var(--sky); padding: 5px 15px; border-radius: 8px;}
  .nav-back:hover { background: var(--sky); color: #000; }
  .panel-grid { display:grid; grid-template-columns: 1.05fr 1fr; gap:28px; }
  @media (max-width: 880px){ .panel-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <span class="eyebrow">⚡ Zepar Module</span>
    <h1 class="title">Fake Call iOS</h1>
    <p class="sub">Buat tangkapan layar panggilan masuk ala iOS tanpa perlu aplikasi tambahan.</p>
  </header>

  <div class="panel-grid">
    <div class="card">
      <h2><span class="badge-dot"></span>Atur Panggilan</h2>
      <div class="field">
        <label>Foto Profil</label>
        <label class="file-drop">
          <img class="thumb" id="callAvatarThumb">
          <span id="callAvatarLabel">Klik untuk upload foto profil</span>
          <input type="file" id="callAvatar" accept="image/*">
        </label>
      </div>
      <div class="field">
        <label>Nama Kontak</label>
        <input type="text" id="callName" value="my heart ❤️">
      </div>
      <div class="field">
        <label>Durasi Panggilan</label>
        <input type="text" id="callDuration" value="01:00:39">
      </div>
      <button class="make-btn" id="callMakeBtn">✨ Buat Fake Call</button>
    </div>

    <div class="card preview-card">
      <h2><span class="badge-dot"></span>Preview</h2>
      <div class="canvas-frame"><canvas id="callCanvas" width="750" height="1334"></canvas></div>
      <button class="dl-btn" id="callDownload">⬇️ Unduh PNG</button>
      <p class="hint">Tampilan panggilan iOS, font Roboto bawaan akan digunakan secara otomatis.</p>
    </div>
  </div>
</div>
<script>
function readFileAsImage(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>resolve(img);
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function bindFileDrop(inputId, thumbId, labelId, labelDefaultText, onLoad){
  const input = document.getElementById(inputId);
  if(!input) return;
  const thumb = document.getElementById(thumbId);
  const label = document.getElementById(labelId);
  input.addEventListener('change', async ()=>{
    if(!input.files[0]) return;
    const img = await readFileAsImage(input.files[0]);
    thumb.src = img.src;
    thumb.style.display='inline-block';
    label.textContent = input.files[0].name;
    onLoad(img);
  });
}

function placeholderAvatar(size, hue){
  const c = document.createElement('canvas');
  c.width=size; c.height=size;
  const cx = c.getContext('2d');
  const grad = cx.createLinearGradient(0,0,size,size);
  grad.addColorStop(0, `hsl(${hue},80%,80%)`);
  grad.addColorStop(1, `hsl(${hue+40},80%,70%)`);
  cx.fillStyle=grad; cx.fillRect(0,0,size,size);
  cx.font = `${size*0.5}px sans-serif`;
  cx.textAlign='center'; cx.textBaseline='middle';
  cx.fillText('👤', size/2, size/2+2);
  const img = new Image();
  img.src = c.toDataURL();
  return img;
}

function drawCoverImage(ctx,img,x,y,w,h){
  ctx.save();
  ctx.beginPath();
  ctx.rect(x,y,w,h);
  ctx.clip();
  const s = Math.max(w/img.width, h/img.height);
  const dw = img.width*s, dh = img.height*s;
  ctx.drawImage(img, x+(w-dw)/2, y+(h-dh)/2, dw, dh);
  ctx.restore();
}

let callAvatarImg = null;
let callBgImg = null;
const CALL_BG_URL = "https://raw.githubusercontent.com/ryyntwx/allimagerin/refs/heads/main/353dc125-a39c-4d27-9ba5-9ec7dfa6624a.png";

function loadImageEl(src){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = ()=>resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

bindFileDrop('callAvatar','callAvatarThumb','callAvatarLabel','', img=>{ callAvatarImg = img; renderCall(); });

async function renderCall(){
  const canvas = document.getElementById('callCanvas');
  const ctx = canvas.getContext('2d');
  const name = document.getElementById('callName').value || 'Unknown';
  const duration = document.getElementById('callDuration').value || '00:00';

  if(!callBgImg){
    try{ callBgImg = await loadImageEl(CALL_BG_URL); }
    catch(e){ console.error('Gagal memuat background', e); return; }
  }

  canvas.width = callBgImg.width; 
  canvas.height = callBgImg.height;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(callBgImg,0,0);

  // Draw Avatar
  const ppX = canvas.width / 2;
  const ppY = canvas.height * 0.50;
  const ppRadius = canvas.width * 0.22;

  ctx.save(); 
  ctx.beginPath(); 
  ctx.arc(ppX, ppY, ppRadius, 0, Math.PI*2);
  ctx.closePath(); 
  ctx.clip();
  const avatar = callAvatarImg || placeholderAvatar(ppRadius*2, 220);
  drawCoverImage(ctx, avatar, ppX - ppRadius, ppY - ppRadius, ppRadius * 2, ppRadius * 2);
  ctx.restore();

  // Draw Name
  const namaY = 75;
  const namaSize = 42;
  ctx.font = `700 ${namaSize}px Roboto, sans-serif`; 
  ctx.fillStyle = '#FFFFFF'; 
  ctx.textAlign = 'center'; 
  ctx.textBaseline = 'top';
  ctx.fillText(name, canvas.width / 2, namaY);

  // Draw Duration
  const angkaY = 133;
  const angkaSize = 35;
  ctx.font = `400 ${angkaSize}px Roboto, sans-serif`; 
  ctx.fillStyle = '#C5C5C5'; 
  ctx.textAlign = 'center'; 
  ctx.textBaseline = 'top';
  ctx.fillText(duration, canvas.width / 2, angkaY);
}

document.getElementById('callMakeBtn').addEventListener('click', renderCall);
document.getElementById('callName').addEventListener('input', renderCall);
document.getElementById('callDuration').addEventListener('input', renderCall);

document.getElementById('callDownload').addEventListener('click', ()=>{
  const a = document.createElement('a'); a.download = 'fake-call-ios.png';
  a.href = document.getElementById('callCanvas').toDataURL('image/png'); a.click();
});

// Initial render
renderCall();
</script>
</body>
</html>
