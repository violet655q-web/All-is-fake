  .sidebar.active { left: 0; }
  .sidebar h2 { color: #fff; font-family: 'Baloo 2'; margin-bottom: 30px; font-size: 24px; text-align: center; border-bottom: 1px solid #3a1f52; padding-bottom: 15px; }
  .sidebar a { display: block; color: var(--ink); text-decoration: none; padding: 15px 20px; margin-bottom: 12px; border-radius: 12px; background: #0f0819; transition: 0.2s; border: 1px solid #3a1f52; font-family: 'Baloo 2'; font-weight: 700; }
  .sidebar a:hover { background: linear-gradient(135deg, var(--sakura-3), var(--lilac)); color: #fff; }
  .menu-btn { position: absolute; left: 20px; top: 20px; z-index: 999; background: var(--card); border: 2px solid #3a1f52; color: #fff; padding: 12px 20px; border-radius: 12px; cursor: pointer; }

  .dl-btn{ width:100%; padding:14px; border-radius:14px; font-family:'Baloo 2'; font-weight:800; color:#fff; background: var(--sakura-2); cursor:pointer; border:none; text-align:center; display:none; text-decoration:none;}
</style>
<script>
  function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('active');
      document.getElementById('overlay').classList.toggle('active');
  }
  function drawRoundedRect(ctx, x, y, w, h, r, fill) {
      ctx.fillStyle = fill; ctx.beginPath();
      ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath(); ctx.fill();
  }
  function drawCircleImage(ctx, img, cx, cy, r) {
      ctx.save(); ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.closePath(); ctx.clip();
      ctx.drawImage(img, cx - r, cy - r, r * 2, r * 2); ctx.restore();
  }
  function wrapText(ctx, text, maxWidth) {
      const words = text.split(/(\s+)/); const lines = []; let currentLine = '';
      for (const word of words) {
          if (!word || (word.trim() === '' && currentLine === '')) continue;
          const testLine = currentLine + word;
          if (ctx.measureText(testLine).width > maxWidth) {
              if (currentLine !== '') { lines.push(currentLine.trimEnd()); currentLine = word.trimStart(); } 
              else { lines.push(testLine); currentLine = ''; }
          } else { currentLine = testLine; }
      }
      if (currentLine.trim()) lines.push(currentLine.trimEnd());
      return lines;
  }
</script>

<script>
async function generateTTQC() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const bgImg = new Image(); const avatarImg = new Image();
    bgImg.crossOrigin = "Anonymous"; avatarImg.crossOrigin = "Anonymous";
    
    bgImg.src = 'https://raw.githubusercontent.com/Ditzzx-vibecoder/Assets/main/ttqc/qyzwa.png';
    avatarImg.src = document.getElementById('avatar').value;
    
    await new Promise(r => bgImg.onload = r);
    await new Promise(r => avatarImg.onload = r);
    
    ctx.clearRect(0, 0, 1080, 2280);
    ctx.drawImage(bgImg, 0, 0, 1080, 2280);
    
    drawCircleImage(ctx, avatarImg, 183, 83, 42); // Top PP
    
    ctx.font = "bold 34px 'Plus Jakarta Sans', sans-serif";
    ctx.fillStyle = '#000000'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(document.getElementById('username').value, 250, 82);
    
    const chatText = document.getElementById('chatText').value;
    ctx.font = "500 30px 'Plus Jakarta Sans', sans-serif";
    const lines = wrapText(ctx, chatText, 520 - 52);
    
    let maxW = 0;
    lines.forEach(l => { const w = ctx.measureText(l).width; if (w > maxW) maxW = w; });
    const bubbleW = Math.max(maxW + 60, 180);
    const bubbleH = lines.length * 43.5 + 48;
    const bubbleX = 175 - 30;
    const bubbleY = 962 - 24;
    
    drawCircleImage(ctx, avatarImg, 75, bubbleY + bubbleH / 2, 38);
    drawRoundedRect(ctx, bubbleX, bubbleY, bubbleW, bubbleH, 35, '#ffffff');
    
    ctx.fillStyle = '#161823';
    lines.forEach((line, i) => {
        ctx.fillText(line, 175, 962 + i * 43.5 + 15);
    });
    
    // Draw Menu (Simplified standard menu drawing from original script)
    const menuY = bubbleY + bubbleH + 28;
    drawRoundedRect(ctx, 90, menuY, 565, 580, 40, '#ffffff'); // Add shadow in full version if needed
    
    const menuItems = [
      { u: '\uf3e5', t: 'Balas', c: '#000' }, { u: '\uf064', t: 'Teruskan', c: '#000' },
      { u: '\uf0c5', t: 'Salin', c: '#000' }, { u: '\uf1ab', t: 'Terjemahkan', c: '#000' },
      { u: '\uf2ed', t: 'Hapus untuk saya', c: '#000' }, { u: '\uf024', t: 'Laporkan', c: '#ea4335' }
    ];
    
    menuItems.forEach((item, i) => {
        const cy = menuY + 25 + i * 90 + 45;
        ctx.fillStyle = item.c;
        ctx.font = "900 34px 'Font Awesome 6 Free'"; ctx.textAlign = 'center';
        ctx.fillText(item.u, 150, cy);
        ctx.font = "500 34px 'Plus Jakarta Sans'"; ctx.textAlign = 'left';
        ctx.fillText(item.t, 220, cy);
    });
    
    const dlBtn = document.getElementById('downloadBtn');
    dlBtn.href = canvas.toDataURL('image/png');
    dlBtn.style.display = 'block';
}
</script>
