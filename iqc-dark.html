<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake IQC Dark - Zepar</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --sakura-1:#2a0f3d; --sakura-2:#ff2e88; --sakura-3:#c026d3;
    --lilac:#a855f7; --sky:#22d3ee; --ink:#efe6ff;
    --paper:#0a0612; --card:#150c22; --gold:#ffd166;
    --shadow: 0 10px 30px rgba(168, 40, 220, 0.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh; font-family:'Zen Maru Gothic', sans-serif;
    color:var(--ink); background-image: url('https://files.catbox.moe/71hgmr.jpg');
    background-size: cover; background-position: center;
    background-attachment: fixed; overflow-x:hidden;
  }
  .wrap{ max-width:1180px; margin:0 auto; padding:36px 20px 80px; }
  .card{ background:var(--card); border-radius:22px; padding:26px 24px; box-shadow: var(--shadow); border:1px solid #3a1f52; margin-bottom: 20px;}
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:12.5px; font-weight:700; color:#9c7fc9; margin-bottom:6px; font-family:'Baloo 2', sans-serif; }
  .field input, .field textarea{ width:100%; padding:11px 13px; border-radius:12px; border:1.5px solid #3a1f52; background:#0f0819; color:var(--ink); }
  
  /* CSS Sistem Gambar Baru */
  .file-drop{ border:2px dashed #4a2670; border-radius:14px; padding:14px; text-align:center; cursor:pointer; background:#150c22; font-size:13px; color:#9c7fc9; transition:.15s; display:flex; align-items:center; justify-content:center; gap:8px; width: 100%;}
  .file-drop:hover{ background:#1e1130; border-color:var(--sakura-3); }
  .file-drop input{ display:none; }
  .thumb{ width:34px; height:34px; border-radius:8px; object-fit:cover; display:none; }

  .make-btn{ width:100%; padding:14px; border-radius:14px; font-family:'Baloo 2'; font-weight:800; color:#fff; background: linear-gradient(135deg, var(--sakura-3), var(--sky)); cursor:pointer; border:none; margin-top: 10px;}
  .canvas-frame{ width:100%; max-width:360px; border-radius:18px; border:6px solid #1a0e2b; background:#0f0819; margin: 20px auto; display:block; }
  .canvas-frame canvas{ width:100%; display:block; }
  .sidebar { position: fixed; left: -300px; top: 0; width: 300px; height: 100%; background: var(--card); border-right: 2px solid #3a1f52; transition: left 0.3s ease; z-index: 1000; padding: 20px; box-shadow: var(--shadow); }
  .sidebar.active { left: 0; }
  .sidebar h2 { color: #fff; font-family: 'Baloo 2'; margin-bottom: 30px; font-size: 24px; text-align: center; border-bottom: 1px solid #3a1f52; padding-bottom: 15px; }
  .sidebar a { display: block; color: var(--ink); text-decoration: none; padding: 15px 20px; margin-bottom: 12px; border-radius: 12px; background: #0f0819; transition: 0.2s; border: 1px solid #3a1f52; font-family: 'Baloo 2'; font-weight: 700; }
  .sidebar a:hover { background: linear-gradient(135deg, var(--sakura-3), var(--lilac)); color: #fff; }
  .menu-btn { position: absolute; left: 20px; top: 20px; z-index: 999; background: var(--card); border: 2px solid #3a1f52; color: #fff; padding: 12px 20px; border-radius: 12px; cursor: pointer; }
  .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 998; display: none; }
  .overlay.active { display: block; }
  .dl-btn{ width:100%; padding:14px; border-radius:14px; font-family:'Baloo 2'; font-weight:800; color:#fff; background: var(--sakura-2); cursor:pointer; border:none; text-align:center; display:none; text-decoration:none;}
</style>
<script>
  function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('active');
      document.getElementById('overlay').classList.toggle('active');
  }
  function drawRoundedRect(ctx, x, y, w, h, r, fill) {
      ctx.fillStyle = fill; ctx.beginPath();
      ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath(); ctx.fill();
  }
  function drawCircleImage(ctx, img, cx, cy, r) {
      ctx.save(); ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.closePath(); ctx.clip();
      ctx.drawImage(img, cx - r, cy - r, r * 2, r * 2); ctx.restore();
  }
  function wrapText(ctx, text, maxWidth) {
      const words = text.split(/(\s+)/); const lines = []; let currentLine = '';
      for (const word of words) {
          if (!word || (word.trim() === '' && currentLine === '')) continue;
          const testLine = currentLine + word;
          if (ctx.measureText(testLine).width > maxWidth) {
              if (currentLine !== '') { lines.push(currentLine.trimEnd()); currentLine = word.trimStart(); } 
              else { lines.push(testLine); currentLine = ''; }
          } else { currentLine = testLine; }
      }
      if (currentLine.trim()) lines.push(currentLine.trimEnd());
      return lines;
  }
  
  /* Fungsi JS Sistem Gambar Baru */
  function readFileAsImage(file){
    return new Promise((resolve,reject)=>{
      const reader = new FileReader();
      reader.onload = e=>{
        const img = new Image();
        img.onload = ()=>resolve(img);
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
  function bindFileDrop(inputId, thumbId, labelId, onLoad){
    const input = document.getElementById(inputId);
    if(!input) return;
    const thumb = document.getElementById(thumbId);
    const label = document.getElementById(labelId);
    input.addEventListener('change', async ()=>{
      if(!input.files[0]) return;
      const img = await readFileAsImage(input.files[0]);
      thumb.src = img.src;
      thumb.style.display='inline-block';
      label.textContent = input.files[0].name;
      onLoad(img);
    });
  }
</script>

</head>
<body>
<button class="menu-btn" onclick="toggleMenu()">☰ Buka Menu</button>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="sidebar" id="sidebar">
    <h2>⚡ Zepar Features</h2>
    <a href="index.html">🏠 Home</a>
    <a href="fake-chat-wa.html">💬 Fake Chat WA</a>
    <a href="fake-post-ig.html">📸 Fake Post IG</a>
    <a href="fake-note-ig.html">📝 Fake Note IG</a>
    <a href="iqc-dark.html">🔮 Fake IQC</a>
    <a href="ttqc.html">🎵 Fake Tiktok Chat</a>
    <a href="post-ig-v2.html">✨ Fake Post IG v2</a>
</div>
<div class="wrap" style="padding-top: 80px;">
    <div class="card">
        <h2 style="color: #fff; font-family: 'Baloo 2';"><span class="badge-dot"></span> Fake IQC Dark</h2>
        <div class="field"><label>Chat Text</label><textarea id="chatText">Earth without art is just "eh" 🌍🎨✨</textarea></div>
        <div class="field"><label>Time</label><input type="text" id="timeStr" value="16.34"></div>
        
        <!-- Input Gambar Diubah Menjadi File Drop -->
        <div class="field">
          <label>Image (Optional)</label>
          <label class="file-drop">
            <img class="thumb" id="imgThumb">
            <span id="imgLabel">Klik untuk upload foto</span>
            <input type="file" id="imageFile" accept="image/*">
          </label>
        </div>

        <button class="make-btn" onclick="generateIQC()">Generate Image</button>
    </div>
    <div class="canvas-frame"><canvas id="canvas" width="941" height="1671"></canvas></div>
    <a id="downloadBtn" class="dl-btn" download="iqc-dark.png">Download Image</a>
</div>
<script>
// Menyimpan gambar yang diupload
let uploadedImage = null;
bindFileDrop('imageFile', 'imgThumb', 'imgLabel', img => { uploadedImage = img; });

async function generateIQC() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    // Load background image
    const bgImg = new Image(); 
    bgImg.crossOrigin = "Anonymous";
    bgImg.src = 'https://raw.githubusercontent.com/ryyntwx/allimagerin/refs/heads/main/iqc-hytam.png';
    await new Promise(r => bgImg.onload = r);
    
    ctx.drawImage(bgImg, 0, 0, 941, 1671);
    
    const timeStr = document.getElementById('timeStr').value;
    const chatText = document.getElementById('chatText').value;
    
    // Tulis Jam di bagian atas
    ctx.fillStyle = "#ffffff"; ctx.font = "27px 'Inter', sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "top";
    ctx.fillText(timeStr, 463, 8);
    
    // Setup teks chat
    ctx.font = "30px 'Inter'"; ctx.textAlign = "left"; ctx.textBaseline = "middle";
    const lines = wrapText(ctx, chatText, 530);
    
    // Hitung dimensi gambar (jika ada)
    let imgW = 0;
    let imgH = 0;
    if (uploadedImage) {
        // Skala gambar maksimal lebar 480px agar muat di bubble
        const scale = Math.min(480 / uploadedImage.width, 1);
        imgW = uploadedImage.width * scale;
        imgH = uploadedImage.height * scale;
    }

    // Hitung ukuran bubble
    let bubbleW = Math.max(ctx.measureText(lines[0] || '').width + 60, 200);
    if (uploadedImage) {
        // Lebarkan bubble jika gambar lebih lebar dari teks
        bubbleW = Math.max(bubbleW, imgW + 40); 
    }
    
    // Tinggi bubble bergantung pada jumlah baris teks + tinggi gambar
    const bubbleH = lines.length * 44 + 40 + 22 + (uploadedImage ? imgH + 20 : 0);
    const finalY = 946 - bubbleH;
    
    // Gambar Bubble
    ctx.fillStyle = "#1c1c1e";
    drawRoundedRect(ctx, 35, finalY, bubbleW, bubbleH, 28, '#1c1c1e');
    
    // Gambar ekor bubble (tail)
    ctx.beginPath();
    ctx.moveTo(47, finalY + bubbleH - 20);
    ctx.quadraticCurveTo(33, finalY + bubbleH - 4, 27, finalY + bubbleH);
    ctx.quadraticCurveTo(41, finalY + bubbleH, 57, finalY + bubbleH - 2);
    ctx.fill();
    
    let contentY = finalY + 20;

    // --- RENDER GAMBAR UPLOAD (JIKA ADA) ---
    if (uploadedImage) {
        ctx.save();
        ctx.beginPath();
        // Bikin gambar rounded corner (sudut melengkung)
        const r = 16;
        const x = 55;
        const y = contentY;
        ctx.moveTo(x + r, y); ctx.lineTo(x + imgW - r, y);
        ctx.quadraticCurveTo(x + imgW, y, x + imgW, y + r);
        ctx.lineTo(x + imgW, y + imgH - r);
        ctx.quadraticCurveTo(x + imgW, y + imgH, x + imgW - r, y + imgH);
        ctx.lineTo(x + r, y + imgH);
        ctx.quadraticCurveTo(x, y + imgH, x, y + imgH - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
        ctx.clip(); // Potong area mengikuti rounded rect
        
        // Tempel gambar
        ctx.drawImage(uploadedImage, x, y, imgW, imgH);
        ctx.restore();
        
        // Turunkan titik start teks ke bawah gambar
        contentY += imgH + 20; 
    }

    // --- RENDER TEKS CHAT ---
    ctx.fillStyle = "#ffffff";
    lines.forEach((line, i) => {
        ctx.fillText(line, 55, contentY + (i * 44) + 15);
    });
    
    // Waktu di pojok kanan bubble
    ctx.fillStyle = "#727278"; ctx.font = "22px 'Inter'"; ctx.textAlign = "right"; ctx.textBaseline = "top";
    ctx.fillText(timeStr, 35 + bubbleW - 22, finalY + bubbleH - 38);
    
    // Bar Reaksi Emoji
    drawRoundedRect(ctx, 43, finalY - 74 - 18, 545, 74, 37, '#1c1c1e');
    ctx.fillStyle = "#ffffff"; ctx.font = "36px Arial"; ctx.textAlign = "center"; ctx.textBaseline="middle";
    const ems = ['👍','❤️','😂','😮','😢','🙏'];
    ems.forEach((e, i) => ctx.fillText(e, 98 + (i * 76), finalY - 18 - 37));
    ctx.fillStyle = "#8e8e93"; ctx.fillText("+", 98 + (6 * 76) - 8, finalY - 18 - 37);
    
    // Tampilkan tombol download
    const dlBtn = document.getElementById('downloadBtn');
    dlBtn.href = canvas.toDataURL('image/png');
    dlBtn.style.display = 'block';
}
</script>
</body>
