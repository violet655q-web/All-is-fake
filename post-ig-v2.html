  .sidebar.active { left: 0; }
  .sidebar h2 { color: #fff; font-family: 'Baloo 2'; margin-bottom: 30px; font-size: 24px; text-align: center; border-bottom: 1px solid #3a1f52; padding-bottom: 15px; }
  .sidebar a { display: block; color: var(--ink); text-decoration: none; padding: 15px 20px; margin-bottom: 12px; border-radius: 12px; background: #0f0819; transition: 0.2s; border: 1px solid #3a1f52; font-family: 'Baloo 2'; font-weight: 700; }

  .menu-btn { position: absolute; left: 20px; top: 20px; z-index: 999; background: var(--card); border: 2px solid #3a1f52; color: #fff; padding: 12px 20px; border-radius: 12px; cursor: pointer; }

  .overlay.active { display: block; }
  .dl-btn{ width:100%; padding:14px; border-radius:14px; font-family:'Baloo 2'; font-weight:800; color:#fff; background: var(--sakura-2); cursor:pointer; border:none; text-align:center; display:none; text-decoration:none;}
</style>
<script>
  function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('active');
      document.getElementById('overlay').classList.toggle('active');
  }
  function drawRoundedRect(ctx, x, y, w, h, r, fill) {
      ctx.fillStyle = fill; ctx.beginPath();
      ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath(); ctx.fill();
  }
  function drawCircleImage(ctx, img, cx, cy, r) {
      ctx.save(); ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.closePath(); ctx.clip();
      ctx.drawImage(img, cx - r, cy - r, r * 2, r * 2); ctx.restore();
  }
  function wrapText(ctx, text, maxWidth) {
      const words = text.split(/(\s+)/); const lines = []; let currentLine = '';
      for (const word of words) {
          if (!word || (word.trim() === '' && currentLine === '')) continue;
          const testLine = currentLine + word;
          if (ctx.measureText(testLine).width > maxWidth) {
              if (currentLine !== '') { lines.push(currentLine.trimEnd()); currentLine = word.trimStart(); } 
              else { lines.push(testLine); currentLine = ''; }
          } else { currentLine = testLine; }
      }
      if (currentLine.trim()) lines.push(currentLine.trimEnd());
      return lines;
  }
</script>

<script>
async function generateIG() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const bgImg = new Image(); const avImg = new Image(); const photoImg = new Image();
    bgImg.crossOrigin = "Anonymous"; avImg.crossOrigin = "Anonymous"; photoImg.crossOrigin = "Anonymous";
    
    bgImg.src = 'https://raw.githubusercontent.com/Ditzzx-vibecoder/Assets/main/igstory/storyig.png';
    avImg.src = document.getElementById('avatar').value;
    photoImg.src = document.getElementById('mainPhoto').value;
    
    await Promise.all([
        new Promise(r => bgImg.onload = r),
        new Promise(r => avImg.onload = r),
        new Promise(r => photoImg.onload = r)
    ]);
    
    ctx.fillStyle = '#0c0f14'; ctx.fillRect(0,0,1080,1400);
    ctx.drawImage(bgImg, 0, 0, 1080, 1564); // Bg is taller
    
    // Main Photo
    ctx.drawImage(photoImg, -3, 157, 1089, 1089);
    
    // Avatar
    drawCircleImage(ctx, avImg, 83.5, 85.5, 48.5);
    
    // Text
    ctx.font = "500 38px 'Inter'"; ctx.fillStyle = '#f9fdfe';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(document.getElementById('username').value, 159, 58 + 59/2);
    
    ctx.font = "500 43px 'Inter'";
    ctx.fillText(document.getElementById('likes').value, 126, 1302);
    ctx.fillText(document.getElementById('comments').value, 360, 1302);
    ctx.fillText(document.getElementById('reposts').value, 563, 1302);
    
    const dlBtn = document.getElementById('downloadBtn');
    dlBtn.href = canvas.toDataURL('image/png');
    dlBtn.style.display = 'block';
}
</script>
