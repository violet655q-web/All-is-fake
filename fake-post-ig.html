<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zepar - Fake Post IG</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sakura-1:#2a0f3d;
    --sakura-2:#ff2e88;
    --sakura-3:#c026d3;
    --lilac:#a855f7;
    --sky:#22d3ee;
    --ink:#efe6ff;
    --paper:#0a0612;
    --card:#150c22;
    --gold:#ffd166;
    --shadow: 0 10px 30px rgba(168, 40, 220, 0.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    font-family:'Zen Maru Gothic', sans-serif;
    color:var(--ink);
    background-image: url('https://files.catbox.moe/71hgmr.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    overflow-x:hidden;
    position:relative;
  }
  .wrap{position:relative; z-index:1; max-width:1180px; margin:0 auto; padding:36px 20px 80px;}
  header.hero{ text-align:center; margin-bottom:34px; }
  .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-family:'Baloo 2', sans-serif; font-weight:700;
    font-size:13px; letter-spacing:.14em; text-transform:uppercase;
    color:#ff6fd4; background:#1a0e2b; border:1px solid #5a2680;
    padding:6px 16px; border-radius:999px; box-shadow: var(--shadow);
  }
  h1.title{
    font-family:'Baloo 2', sans-serif; font-weight:800;
    font-size:clamp(32px, 6vw, 54px); margin:16px 0 6px;
    line-height:1.05; background: linear-gradient(90deg, var(--sakura-2), var(--lilac) 55%, var(--sky));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter: drop-shadow(0 0 18px rgba(192,38,212,.45));
  }
  .sub{ color:#b39cc9; font-size:15.5px; max-width:520px; margin:0 auto; }
  .card{ background:var(--card); border-radius:22px; padding:26px 24px; box-shadow: var(--shadow); border:1px solid #3a1f52; margin-bottom: 20px;}
  .card h2{ font-family:'Baloo 2', sans-serif; font-size:19px; margin:0 0 18px; display:flex; align-items:center; gap:8px; color:#f0e6ff; }
  .badge-dot{width:9px; height:9px; border-radius:50%; background:var(--sakura-2); display:inline-block; box-shadow:0 0 8px var(--sakura-2);}
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:12.5px; font-weight:700; color:#9c7fc9; margin-bottom:6px; letter-spacing:.03em; text-transform:uppercase; font-family:'Baloo 2', sans-serif; }
  .field input[type=text], .field textarea, .field select{ width:100%; padding:11px 13px; border-radius:12px; border:1.5px solid #3a1f52; background:#0f0819; font-family:'Zen Maru Gothic', sans-serif; font-size:14.5px; color:var(--ink); resize:vertical; }
  .field input:focus, .field textarea:focus, .field select:focus{ outline:none; border-color: var(--sakura-3); box-shadow:0 0 0 3px rgba(192,38,212,.25); }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .file-drop{ border:2px dashed #4a2670; border-radius:14px; padding:14px; text-align:center; cursor:pointer; background:#150c22; font-size:13px; color:#9c7fc9; transition:.15s; display:flex; align-items:center; justify-content:center; gap:8px; }
  .file-drop:hover{ background:#1e1130; border-color:var(--sakura-3); }
  .file-drop input{ display:none; }
  .thumb{ width:34px; height:34px; border-radius:8px; object-fit:cover; display:none; }
  .toggle-row{ display:flex; gap:10px; }
  .toggle-row button{ flex:1; padding:10px; border-radius:12px; border:1.5px solid #3a1f52; background:#0f0819; font-family:'Baloo 2', sans-serif; font-weight:700; font-size:13px; color:#9c7fc9; cursor:pointer; transition:.15s; }
  .toggle-row button.active{ background: linear-gradient(135deg, var(--sakura-3), var(--lilac)); color:#fff; border-color:transparent; }
  .make-btn{ width:100%; margin-top:6px; padding:14px; border:none; border-radius:14px; font-family:'Baloo 2', sans-serif; font-weight:800; font-size:15.5px; color:#fff; background: linear-gradient(135deg, var(--sakura-3), var(--sky)); cursor:pointer; box-shadow:0 8px 24px rgba(192,38,212,.45); transition:.15s; }
  .make-btn:hover{ transform:translateY(-2px); box-shadow:0 12px 30px rgba(34,211,238,.4); }
  .preview-card{ display:flex; flex-direction:column; align-items:center; gap:14px; }
  .canvas-frame{ width:100%; max-width:360px; border-radius:18px; overflow:hidden; box-shadow: 0 14px 34px rgba(168,40,220,.35); border:6px solid #1a0e2b; background:#0f0819; }
  .canvas-frame canvas{ width:100%; display:block; }
  .dl-btn{ font-family:'Baloo 2', sans-serif; font-weight:700; font-size:14px; padding:11px 22px; border-radius:12px; border:2px solid var(--sakura-3); background:transparent; color:var(--sakura-2); cursor:pointer; transition:.15s; }
  .dl-btn:hover{ background:var(--sakura-3); color:#fff; }
  .hint{ font-size:12px; color:#8a72a8; text-align:center; max-width:300px; }
  .nav-back{ display:inline-block; margin-bottom: 20px; color: var(--sky); text-decoration: none; font-family: 'Baloo 2'; font-weight: 700; border: 1px solid var(--sky); padding: 5px 15px; border-radius: 8px;}
  .nav-back:hover { background: var(--sky); color: #000; }
  .panel-grid { display:grid; grid-template-columns: 1.05fr 1fr; gap:28px; }
  @media (max-width: 880px){ .panel-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <a href="index.html" class="nav-back">← Kembali ke Menu</a>
  <header class="hero">
    <span class="eyebrow">⚡ Zepar Module</span>
    <h1 class="title">Fake Post IG</h1>
  </header>

  <div class="panel-grid">
    <div class="card">
      <h2><span class="badge-dot"></span>Atur Postingan</h2>
      <div class="field">
        <label>Foto Profil</label>
        <label class="file-drop">
          <img class="thumb" id="igAvatarThumb">
          <span id="igAvatarLabel">Klik untuk upload foto profil</span>
          <input type="file" id="igAvatar" accept="image/*">
        </label>
      </div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="igUsername" value="@sakura.chan">
      </div>
      <div class="field">
        <label>Foto / gambar postingan</label>
        <label class="file-drop">
          <img class="thumb" id="igMediaThumb">
          <span id="igMediaLabel">Klik upload gambar postingan</span>
          <input type="file" id="igMedia" accept="image/*">
        </label>
      </div>
      <div class="field">
        <label>Caption (opsional)</label>
        <textarea id="igCaption" rows="2">hari yang indah 🌸✨ #anime #ootd</textarea>
      </div>
      <div class="row2">
        <div class="field">
          <label>Jumlah Like</label>
          <input type="text" id="igLikes" value="12.4K">
        </div>
        <div class="field">
          <label>Waktu Posting</label>
          <input type="text" id="igTime" value="2 JAM">
        </div>
      </div>
      <div class="field">
        <label>Tema Frame</label>
        <div class="toggle-row">
          <button type="button" class="ig-mode" data-mode="light">☀️ Light</button>
          <button type="button" class="ig-mode active" data-mode="dark">🌙 Dark</button>
        </div>
      </div>
      <button class="make-btn" id="igMakeBtn">✨ Buat Post IG</button>
    </div>

    <div class="card preview-card">
      <h2><span class="badge-dot"></span>Preview</h2>
      <div class="canvas-frame"><canvas id="igCanvas" width="720" height="1040"></canvas></div>
      <button class="dl-btn" id="igDownload">⬇️ Unduh PNG</button>
    </div>
  </div>
</div>
<script>

function readFileAsImage(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>resolve(img);
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function bindFileDrop(inputId, thumbId, labelId, labelDefaultText, onLoad){
  const input = document.getElementById(inputId);
  if(!input) return;
  const thumb = document.getElementById(thumbId);
  const label = document.getElementById(labelId);
  input.addEventListener('change', async ()=>{
    if(!input.files[0]) return;
    const img = await readFileAsImage(input.files[0]);
    thumb.src = img.src;
    thumb.style.display='inline-block';
    label.textContent = input.files[0].name;
    onLoad(img);
  });
}
function wrapText(ctx, text, maxWidth){
  const words = String(text).split(/\s+/);
  const lines = [];
  let line = '';
  for(const w of words){
    const test = line ? line+' '+w : w;
    if(ctx.measureText(test).width > maxWidth && line){
      lines.push(line);
      line = w;
    } else { line = test; }
  }
  if(line) lines.push(line);
  return lines;
}
function drawCircleImage(ctx,img,x,y,size){
  ctx.save();
  ctx.beginPath();
  ctx.arc(x+size/2,y+size/2,size/2,0,Math.PI*2);
  ctx.closePath();
  ctx.clip();
  const s = Math.max(size/img.width, size/img.height);
  const dw = img.width*s, dh = img.height*s;
  ctx.drawImage(img, x+size/2-dw/2, y+size/2-dh/2, dw, dh);
  ctx.restore();
}
function placeholderAvatar(size, hue){
  const c = document.createElement('canvas');
  c.width=size; c.height=size;
  const cx = c.getContext('2d');
  const grad = cx.createLinearGradient(0,0,size,size);
  grad.addColorStop(0, `hsl(${hue},80%,80%)`);
  grad.addColorStop(1, `hsl(${hue+40},80%,70%)`);
  cx.fillStyle=grad; cx.fillRect(0,0,size,size);
  cx.font = `${size*0.5}px sans-serif`;
  cx.textAlign='center'; cx.textBaseline='middle';
  cx.fillText('🌸', size/2, size/2+2);
  const img = new Image();
  img.src = c.toDataURL();
  return img;
}
function drawCoverImage(ctx,img,x,y,w,h){
  ctx.save();
  ctx.beginPath();
  ctx.rect(x,y,w,h);
  ctx.clip();
  const s = Math.max(w/img.width, h/img.height);
  const dw = img.width*s, dh = img.height*s;
  ctx.drawImage(img, x+(w-dw)/2, y+(h-dh)/2, dw, dh);
  ctx.restore();
}

function heartIcon(ctx,x,y,s,color){ ctx.save(); ctx.translate(x,y); ctx.beginPath(); ctx.fillStyle=color; ctx.moveTo(0, s*0.3); ctx.bezierCurveTo(0,-s*0.2, -s,-s*0.2, -s, s*0.3); ctx.bezierCurveTo(-s, s*0.75, 0, s*1.0, 0, s*1.2); ctx.bezierCurveTo(0, s*1.0, s, s*0.75, s, s*0.3); ctx.bezierCurveTo(s,-s*0.2, 0,-s*0.2, 0, s*0.3); ctx.fill(); ctx.restore(); }
function commentIcon(ctx,x,y,s,color){ ctx.save(); ctx.translate(x,y); ctx.strokeStyle=color; ctx.lineWidth=s*0.14; ctx.lineJoin='round'; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(-s, s*0.3); ctx.quadraticCurveTo(-s, -s, 0, -s); ctx.quadraticCurveTo(s, -s, s, s*0.3); ctx.quadraticCurveTo(s, s*0.9, 0, s*0.9); ctx.lineTo(-s*0.3, s*1.4); ctx.lineTo(-s*0.2, s*0.85); ctx.quadraticCurveTo(-s, s*0.8, -s, s*0.3); ctx.stroke(); ctx.restore(); }
function shareIcon(ctx,x,y,s,color){ ctx.save(); ctx.translate(x,y); ctx.strokeStyle=color; ctx.lineWidth=s*0.14; ctx.lineJoin='round'; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(-s, s); ctx.lineTo(0,-s); ctx.lineTo(s, s); ctx.moveTo(0,-s); ctx.lineTo(0, s*0.9); ctx.stroke(); ctx.restore(); }
function bookmarkIcon(ctx,x,y,s,color){ ctx.save(); ctx.translate(x,y); ctx.strokeStyle=color; ctx.lineWidth=s*0.14; ctx.lineJoin='round'; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(-s*0.7,-s); ctx.lineTo(-s*0.7,s); ctx.lineTo(0,s*0.4); ctx.lineTo(s*0.7,s); ctx.lineTo(s*0.7,-s); ctx.closePath(); ctx.stroke(); ctx.restore(); }

let igAvatarImg=null, igMediaImg=null, igMode='dark';
bindFileDrop('igAvatar','igAvatarThumb','igAvatarLabel','', img=>{ igAvatarImg = img; });
bindFileDrop('igMedia','igMediaThumb','igMediaLabel','', img=>{ igMediaImg = img; });

document.querySelectorAll('.ig-mode').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.ig-mode').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); igMode = btn.dataset.mode;
  });
});

const IG_THEMES = {
  light: { bg:'#ffffff', text:'#000000', sub:'#737373', line:'#e0e0e0', accentBg:['#f0f0f0','#e0e0e0'] },
  dark:  { bg:'#000000', text:'#ffffff', sub:'#a3a3a3', line:'#2b2b2b', accentBg:['#1a1a1a','#0d0d0d'] }
};

function renderIG(){
  const canvas = document.getElementById('igCanvas');
  const ctx = canvas.getContext('2d');
  const theme = IG_THEMES[igMode];
  
  const username = document.getElementById('igUsername').value || '@user';
  const caption = document.getElementById('igCaption').value || '';
  const likes = document.getElementById('igLikes').value || '0';
  const timeAgo = document.getElementById('igTime').value || '1 JAM';
  
  const width = 720, headerH = 92, avatarSize=54, avatarX=22, avatarY=20, mediaAreaW = width;
  let mediaH = 720;
  if(igMediaImg){
    const aspect = igMediaImg.width/igMediaImg.height;
    mediaH = Math.round(mediaAreaW/aspect);
    mediaH = Math.min(Math.max(mediaH, 420), 900);
  }
  
  const actionsH = 76;
  ctx.font = `15px 'Zen Maru Gothic', sans-serif`;
  const capLines = caption ? wrapText(ctx, caption, width-44) : [];
  const captionH = caption ? (30 + capLines.length*24 + 10) : 10;
  const likesH = 34, timeH = 30;
  
  const height = headerH + mediaH + actionsH + likesH + captionH + timeH;
  canvas.width = width; canvas.height = height;
  
  ctx.fillStyle = theme.bg; ctx.fillRect(0,0,width,height);
  
  const ringGrad = ctx.createLinearGradient(avatarX,avatarY,avatarX+avatarSize,avatarY+avatarSize);
  ringGrad.addColorStop(0,'#ff9ec4'); ringGrad.addColorStop(1,'#c9b6f7');
  ctx.beginPath(); ctx.arc(avatarX+avatarSize/2, avatarY+avatarSize/2, avatarSize/2+4, 0, Math.PI*2);
  ctx.fillStyle = ringGrad; ctx.fill();
  
  const avatar = igAvatarImg || placeholderAvatar(avatarSize,320);
  drawCircleImage(ctx, avatar, avatarX, avatarY, avatarSize);
  
  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.font = `700 20px 'Baloo 2', sans-serif`; ctx.fillStyle = theme.text;
  ctx.fillText(username, avatarX+avatarSize+16, avatarY+avatarSize/2-6);
  ctx.font = `13px 'Zen Maru Gothic', sans-serif`; ctx.fillStyle = theme.sub;
  ctx.fillText('anime lover ✦ making memories', avatarX+avatarSize+16, avatarY+avatarSize/2+16);
  
  ctx.fillStyle = theme.sub;
  for(let i=0;i<3;i++){ ctx.beginPath(); ctx.arc(width-30, headerH/2-6+i*7, 2.6, 0, Math.PI*2); ctx.fill(); }
  
  ctx.strokeStyle = theme.line; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,headerH); ctx.lineTo(width,headerH); ctx.stroke();
  
  const mediaY = headerH;
  if(igMediaImg){
    ctx.save(); ctx.beginPath(); ctx.rect(0, mediaY, width, mediaH); ctx.clip();
    const s = Math.max(width/igMediaImg.width, mediaH/igMediaImg.height);
    const dw = igMediaImg.width*s, dh = igMediaImg.height*s;
    ctx.drawImage(igMediaImg, (width-dw)/2, mediaY+(mediaH-dh)/2, dw, dh); ctx.restore();
  } else {
    const g = ctx.createLinearGradient(0,mediaY,width,mediaY+mediaH);
    g.addColorStop(0, theme.accentBg[0]); g.addColorStop(1, theme.accentBg[1]);
    ctx.fillStyle = g; ctx.fillRect(0,mediaY,width,mediaH);
    ctx.font = `64px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🌸🎴✨', width/2, mediaY+mediaH/2);
  }
  
  const actY = mediaY+mediaH+actionsH/2;
  heartIcon(ctx, 40, actY-10, 15, '#ff5c8a');
  commentIcon(ctx, 100, actY-6, 14, theme.text);
  shareIcon(ctx, 152, actY-6, 14, theme.text);
  bookmarkIcon(ctx, width-40, actY-6, 14, theme.text);
  
  ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.font = `700 15px 'Baloo 2', sans-serif`; ctx.fillStyle = theme.text;
  ctx.fillText(`${likes} suka`, 24, mediaY+mediaH+actionsH+likesH/2);
  
  let cy = mediaY+mediaH+actionsH+likesH+18;
  if(caption){
    ctx.font = `700 15px 'Baloo 2', sans-serif`; ctx.fillStyle = theme.text;
    const unameW = ctx.measureText(username).width;
    ctx.fillText(username, 24, cy);
    ctx.font = `15px 'Zen Maru Gothic', sans-serif`;
    ctx.fillText(capLines[0]||'', 24+unameW+8, cy);
    for(let i=1;i<capLines.length;i++){ cy += 24; ctx.fillText(capLines[i], 24, cy); }
    cy += 24;
  }
  ctx.font = `12.5px 'Zen Maru Gothic', sans-serif`; ctx.fillStyle = theme.sub; ctx.fillText(timeAgo, 24, cy+8);
}
document.getElementById('igMakeBtn').addEventListener('click', renderIG);
document.getElementById('igDownload').addEventListener('click', ()=>{
  const a = document.createElement('a'); a.download = 'fake-post-ig.png';
  a.href = document.getElementById('igCanvas').toDataURL('image/png'); a.click();
});
renderIG();
</script>
</body>
</html>
