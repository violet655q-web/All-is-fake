<style>
  :root{

    --lilac:#a855f7; --sky:#22d3ee; --ink:#efe6ff;
    --paper:#0a0612; --card:#150c22; --gold:#ffd166;

  h2 { font-family: 'Baloo 2'; color: #fff; }
  
  /* Sidebar Styles */
  .sidebar { position: fixed; left: -300px; top: 0; width: 300px; height: 100%; background: var(--card); border-right: 2px solid #3a1f52; transition: left 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; padding: 20px; box-shadow: var(--shadow); overflow-y: auto;}
  .sidebar.active { left: 0; }
  .sidebar h2 { color: #fff; font-family: 'Baloo 2'; margin-bottom: 30px; font-size: 24px; text-align: center; border-bottom: 1px solid #3a1f52; padding-bottom: 15px; }
  .sidebar a { display: flex; align-items: center; color: var(--ink); text-decoration: none; padding: 15px 20px; margin-bottom: 12px; border-radius: 12px; background: #0f0819; border: 1px solid #3a1f52; font-family: 'Baloo 2'; font-weight: 700; opacity: 0; transform: translateX(-50px); transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
  .sidebar a:hover { background: linear-gradient(135deg, var(--sakura-3), var(--lilac)); color: #fff; }
  .nav-icon { width: 24px; height: 24px; object-fit: contain; margin-right: 12px; }
  .sidebar.active a { opacity: 1; transform: translateX(0); }
  .sidebar a:nth-child(2) { transition-delay: 0.15s; }
  .sidebar a:nth-child(3) { transition-delay: 0.25s; }
  .sidebar a:nth-child(4) { transition-delay: 0.35s; }
  .sidebar a:nth-child(5) { transition-delay: 0.45s; }
  .sidebar a:nth-child(6) { transition-delay: 0.55s; }
  .sidebar a:nth-child(7) { transition-delay: 0.65s; }
  .sidebar a:nth-child(8) { transition-delay: 0.75s; }
  .sidebar a:nth-child(9) { transition-delay: 0.85s; }
  .sidebar a:nth-child(10) { transition-delay: 0.95s; }
  .menu-btn { position: absolute; left: 20px; top: 20px; z-index: 999; background: var(--card); border: 2px solid #3a1f52; color: #fff; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-family: 'Baloo 2', sans-serif;}
  .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 998; display: none; transition: opacity 0.4s; opacity: 0; }
  .overlay.active { display: block; opacity: 1; }

<script>
  function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('active');
      document.getElementById('overlay').classList.toggle('active');
  }

  let touchstartX = 0;
  let touchendX = 0;

  function handleSwipe() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('overlay');
      
      if (touchendX > touchstartX + 60 && touchstartX < 50) {
          sidebar.classList.add('active');
          overlay.classList.add('active');
      }
      if (touchendX < touchstartX - 50 && sidebar.classList.contains('active')) {
          sidebar.classList.remove('active');
          overlay.classList.remove('active');
      }
  }

  document.addEventListener('touchstart', e => {
      touchstartX = e.changedTouches[0].screenX;
  });

  document.addEventListener('touchend', e => {
      touchendX = e.changedTouches[0].screenX;
      handleSwipe();
  });
</script>

</body>
